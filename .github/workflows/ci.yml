name: CI

on:
  push:
  workflow_dispatch:
    inputs:
      create_nightly:
        description: 'Create nightly release'
        type: boolean
        default: false

jobs:
  build:
    runs-on: macos-26
    outputs:
      artifact: ${{ steps.upload-artifact.outputs.artifact }}
    steps:
      - name: Prepare workspace
        shell: bash
        run: |
          current="${GITHUB_WORKSPACE}"
          while [ -n "${current}" ] && [ "${current}" != "/" ]; do
            echo "::add-mask::${current}"
            current=$(dirname "${current}")
          done

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          clean: true
          fetch-depth: 1


      - name: Install Dependencies
        run: |
          cargo install cbindgen --force
          # brew install llvm@20
          brew install lld@20

          WASI_SDK_VER=26
          curl -LO https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_SDK_VER}/wasi-sdk-${WASI_SDK_VER}.0-arm64-macos.tar.gz
          tar xzf wasi-sdk-${WASI_SDK_VER}.0-arm64-macos.tar.gz
          
          WASI_SDK_PATH="$PWD/wasi-sdk-${WASI_SDK_VER}.0-arm64-macos"
          echo "WASI_SDK_PATH=$WASI_SDK_PATH" >> "$GITHUB_ENV"
          echo "WASI_SYSROOT=$WASI_SDK_PATH/share/wasi-sysroot" >> "$GITHUB_ENV"
          echo "WASM_CC=$WASI_SDK_PATH/bin/clang" >> "$GITHUB_ENV"
          echo "WASM_CXX=$WASI_SDK_PATH/bin/clang++" >> "$GITHUB_ENV"

          LLVM_PATH=$(brew --prefix llvm@20)
          LLD_PATH=$(brew --prefix lld@20)
          echo "$LLVM_PATH/bin" >> $GITHUB_PATH
          echo "$LLD_PATH/bin" >> $GITHUB_PATH

      - name: Compute submodule cache key
        id: submodule-key
        shell: bash
        run: |
          firefox_rev=$(git ls-tree HEAD engine/firefox | awk '{print $3}')
          idevice_rev=$(git ls-tree HEAD support/idevice | awk '{print $3}')
          release_tag=$(tr -d '\000\r' < engine/release.txt | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')
          echo "key=submodule-gitdata-${RUNNER_OS}-${firefox_rev}-${idevice_rev}-${release_tag}" >> "$GITHUB_OUTPUT"

      - name: Restore submodule git data cache
        id: submodule-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .git/modules/engine/firefox
            .git/modules/support/idevice
          key: ${{ steps.submodule-key.outputs.key }}


      - name: Checkout Firefox submodule
        run: git submodule update --init --depth 1 --recursive engine/firefox

      - name: Checkout idevice submodule
        run: git submodule update --init --depth 1 --recursive support/idevice

      - name: Save submodule git data cache
        if: steps.submodule-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            .git/modules/engine/firefox
            .git/modules/support/idevice
          key: ${{ steps.submodule-key.outputs.key }}

      - name: Update Gecko
        run: ./tools/development/update-gecko.sh

      - name: Apply Gecko patches
        run: ./tools/development/apply-patches.sh

      - name: Build idevice
        run: ./tools/development/build-idevice.sh

      - name: Build the app
        run: ./tools/release/build-app.sh

      - name: Create .ipa file
        run: ./tools/release/create-ipa.sh

      - name: Tar build artifact
        run: tar -czf ./dist/Reynard.xcarchive.tar.gz -C ./dist Reynard.xcarchive

      - name: Upload build artifact
        id: upload-artifact
        uses: actions/upload-artifact@v4
        with:
          name: Reynard.xcarchive
          path: ./dist/Reynard.xcarchive.tar.gz

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: Reynard.ipa
          path: ./dist/Reynard.ipa

      - name: Clean up workspace
        if: always()
        shell: bash
        run: |
          if [ -n "${GITHUB_WORKSPACE}" ]; then
            find "${GITHUB_WORKSPACE}" -mindepth 1 -maxdepth 1 -exec rm -rf -- {} +
          fi
